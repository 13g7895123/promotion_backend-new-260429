name: promotion

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ../:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  php:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../:/var/www/html
      - ./.env:/var/www/html/.env:ro
    env_file:
      - ./.env
    environment:
      TZ: Asia/Taipei
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Taipei
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      sh -c "while true; do php spark batch-audit:process; sleep 60; done"
    volumes:
      - ../:/var/www/html
      - ./.env:/var/www/html/.env:ro
    env_file:
      - ./.env
    environment:
      TZ: Asia/Taipei
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
